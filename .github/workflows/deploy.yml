name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --no-frozen-lockfile

      - name: Build Next.js
        run: |
          cd apps/web
          pnpm build

      - name: Debug build output
        run: |
          echo "=== apps/web directory ==="
          ls -la apps/web/
          echo ""
          echo "=== Checking for out folder ==="
          if [ -d "apps/web/out" ]; then
            echo "OUT FOLDER EXISTS!"
            ls -la apps/web/out/
          else
            echo "OUT FOLDER DOES NOT EXIST"
          fi
          echo ""
          echo "=== Checking for .next folder ==="
          if [ -d "apps/web/.next" ]; then
            echo ".NEXT FOLDER EXISTS"
            ls apps/web/.next/ | head -10
          else
            echo ".NEXT FOLDER DOES NOT EXIST"
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-static
          path: apps/web/out

      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/deploy-pages@v4
        with:
          artifact_name: nextjs-static
