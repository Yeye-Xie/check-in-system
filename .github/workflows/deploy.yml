name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js app
        run: cd apps/web && pnpm build

      - name: Check output
        run: |
          echo "=== Checking out folder ==="
          ls -la apps/web/out 2>/dev/null || echo "out folder not found"
          echo "=== Checking .next folder ==="
          ls -la apps/web/.next 2>/dev/null | head -10
          echo "=== Build output ==="
          ls apps/web/out 2>/dev/null || ls apps/web 2>/dev/null

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-static
          path: apps/web/out

      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/deploy-pages@v4
        with:
          artifact_name: nextjs-static
